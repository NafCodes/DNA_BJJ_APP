name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-not-used-for-db
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run start &
        id: start

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          exit 1

      - name: Verify health response
        run: curl -sf http://localhost:3000/health | grep -q '"status":"ok"'
